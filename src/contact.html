<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me - Katie Aland Portfolio</title>
  <link rel="stylesheet" href="./stylesheets/main.scss">
  <link rel="icon" type="image/png" href="/images/portfolio-favicon.png">
</head>

<body>
  <a class="visually-hidden-focusable skip-link" href="#main-content">Skip to content</a>
  
  <nav aria-label="primary" class="navbar navbar-expand-lg navbar-dark p-2">
    <div class="container-fluid">
      <a class="navbar-brand logoContainer" href="index.html">
        <img src="images/portfolio-logo.png" class="img-fluid p-1" alt="Katie Aland Logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <i class="bi bi-list fs-1"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-3">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="projects.html">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="contact.html" aria-current="page">Contact Me</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html">About Me</a>
          </li>
      </div>
    </div>
  </nav>

  <main id="main-content" aria-labelledby="contactMeTitle">
    <section id="contactSection" class="container-fluid">
      <div class="heroImgContainer m-4 row align-items-center justify-content-evenly justify-content-xl-center">
        <div class="col-4 my-4 d-none d-lg-flex">
          <img class="img-fluid w-100 h-auto" src="images/HeadShotRedWall.jpg" alt="Katie Aland playing a violin">
        </div>

        <article class="heroText col-12 col-lg-7 mt-4 mt-lg-0 text-md-start">
          <div class="text-center text-lg-start mb-4">
            <h1 id="contactMeTitle" class="fw-bold">Contact Me</h1>
            <h2>Interested in working with me? Get in touch!</h2>
          </div>

          <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thank-you.html" class="w-100">
            <input type="hidden" name="form-name" value="contact">

            <p class="d-none">
              <label>Don’t fill this out if you're human: <input name="bot-field"></label>
            </p>

            <div class="mb-3">
              <label for="fullName" class="form-label fs-4">Full Name</label>
              <input type="text" name="fullName" class="form-control p-2" id="fullName" placeholder="Ex. John Doe" required aria-required="true">
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fs-4">Email</label>
              <input type="email" name="email" class="form-control p-2" id="email" placeholder="Ex. johndoe@email.com" required aria-required="true">
            </div>

            <div class="mb-3">
              <label for="contactMessage" class="form-label fs-4">Message</label>
              <textarea name="contactMessage" class="form-control p-2" id="contactMessage" rows="3" placeholder="Write your message here..." required aria-required="true"></textarea>
            </div>

            <button type="submit" class="btn w-25 mt-3 fw-semibold">Submit</button>
          </form>
        </article>
      </div>
    </section>
  </main>

  <footer class="container-fluid justify-content-center align-items-center d-flex">
    <div class="row d-flex flex-row justify-content-center align-items-center gap-3 gap-md-0">
      <div class="col-12 col-md-4">
        <a class="logoContainer d-flex justify-content-center" href="index.html">
          <img src="images/portfolio-logo.png" class="img-fluid" alt="Katie Aland Logo">
        </a>
      </div>

      <div class="col-12 col-md-4 d-flex justify-content-center gap-3 px-5">
        <a href="https://www.linkedin.com/in/katie-aland/" target="_blank" class="my-auto">
          <i class="bi bi-linkedin fs-2"></i>
          <span class="visually-hidden">Opens LinkedIn in a new tab</span>
        </a>
        <a href="contact.html#contactSection">
          <i class="bi bi-envelope fs-1"></i>
          <span class="visually-hidden">Contact me</span>
        </a>
      </div>
     
      <div class="col-12 col-md-4 d-flex align-items-center">
        <p class="m-auto">&copy;2026 Katie Aland</p>
      </div>
    </div> 
  </footer>

  <script type="module" src="./javascripts/main.js"></script>
</body>
</html>
